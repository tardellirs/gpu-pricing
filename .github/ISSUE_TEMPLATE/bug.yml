name: Bug report
description: Something on the site broke or looks wrong.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you get?
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL (if shareable, including filters)
      placeholder: https://gpu-pricing.vercel.app/?q=H100&price-max=2
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: Chrome 130 on macOS 15
